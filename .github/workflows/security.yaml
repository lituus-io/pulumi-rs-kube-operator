name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  cargo-audit:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo-audit
        run: cargo audit

  cargo-deny:
    name: Dependency Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  fuzz-smoke:
    name: Fuzz Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          key: fuzz
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
      - name: Run each fuzzer for 30 seconds
        run: |
          for target in fuzz_stack_deser fuzz_update_deser fuzz_program_deser fuzz_workspace_deser \
                        fuzz_go_duration fuzz_hmac_validation fuzz_redact_stderr fuzz_lock_detection; do
            echo "::group::Fuzz $target"
            cargo +nightly fuzz run "$target" -- -max_total_time=30 || exit 1
            echo "::endgroup::"
          done
