name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
      - run: cargo test --all-targets

  crd-check:
    name: CRD up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
      - name: Regenerate CRDs
        run: cargo run --bin crdgen > /tmp/all-crds.yaml
      - name: Split CRDs
        run: |
          awk 'BEGIN{n=0; file="/tmp/crd-"n".yaml"} /^---$/{n++; file="/tmp/crd-"n".yaml"; next} {print > file}' /tmp/all-crds.yaml
          cp /tmp/crd-0.yaml /tmp/pulumi.com_stacks.yaml
          cp /tmp/crd-1.yaml /tmp/auto.pulumi.com_workspaces.yaml
          cp /tmp/crd-2.yaml /tmp/auto.pulumi.com_updates.yaml
          cp /tmp/crd-3.yaml /tmp/pulumi.com_programs.yaml
      - name: Diff
        run: |
          diff deploy/crds/pulumi.com_stacks.yaml /tmp/pulumi.com_stacks.yaml
          diff deploy/crds/auto.pulumi.com_workspaces.yaml /tmp/auto.pulumi.com_workspaces.yaml
          diff deploy/crds/auto.pulumi.com_updates.yaml /tmp/auto.pulumi.com_updates.yaml
          diff deploy/crds/pulumi.com_programs.yaml /tmp/pulumi.com_programs.yaml

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - run: helm lint deploy/helm/pulumi-operator
