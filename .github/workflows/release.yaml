name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  HELM_CHART_PATH: deploy/helm/pulumi-operator

jobs:
  # Docker images are built and pushed by docker.yaml (triggered on v* tags).
  # This workflow waits for the image to be available before publishing Helm and GitHub release.

  wait-for-image:
    name: Wait for Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for multi-arch image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}"
          echo "Waiting for ${IMAGE}..."
          for i in $(seq 1 60); do
            if docker manifest inspect "${IMAGE}" > /dev/null 2>&1; then
              echo "Image available!"
              exit 0
            fi
            echo "  Attempt $i/60 — not ready yet, waiting 30s..."
            sleep 30
          done
          echo "::error::Timed out waiting for Docker image"
          exit 1

  publish-helm:
    name: Publish Helm Chart (OCI)
    needs: wait-for-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" ${{ env.HELM_CHART_PATH }}/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" ${{ env.HELM_CHART_PATH }}/Chart.yaml

      - name: Package chart
        run: helm package ${{ env.HELM_CHART_PATH }}

      - name: Push chart to OCI registry
        run: |
          helm push pulumi-operator-${{ steps.version.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

  publish-helm-pages:
    name: Publish Helm Chart (GitHub Pages)
    needs: wait-for-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - uses: actions/checkout@v4
        with:
          path: source
          ref: ${{ github.ref_name }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" source/${{ env.HELM_CHART_PATH }}/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" source/${{ env.HELM_CHART_PATH }}/Chart.yaml

      - name: Package chart
        run: helm package source/${{ env.HELM_CHART_PATH }} -d .

      - name: Update index
        run: |
          if [ -f index.yaml ]; then
            helm repo index . --url https://lituus-io.github.io/pulumi-rs-kube-operator --merge index.yaml
          else
            helm repo index . --url https://lituus-io.github.io/pulumi-rs-kube-operator
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.yaml "pulumi-operator-${{ steps.version.outputs.version }}.tgz"
          git commit -m "Release chart ${{ steps.version.outputs.version }}"
          git push

  create-release:
    name: GitHub Release
    needs: [publish-helm, publish-helm-pages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Download binaries uploaded by docker.yaml
      - name: Wait for binary artifacts
        run: |
          echo "Waiting for docker.yaml workflow artifacts..."
          sleep 10

      - name: Download artifacts via gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/release

          # Find the docker.yaml workflow run for this tag
          RUN_ID=""
          for i in $(seq 1 30); do
            RUN_ID=$(gh run list \
              --workflow docker.yaml \
              --branch "${{ github.ref_name }}" \
              --status completed \
              --json databaseId \
              --jq '.[0].databaseId' 2>/dev/null || true)
            if [[ -n "$RUN_ID" && "$RUN_ID" != "null" ]]; then
              echo "Found docker workflow run: $RUN_ID"
              break
            fi
            echo "  Attempt $i/30 — waiting for docker workflow to complete..."
            sleep 30
          done

          if [[ -z "$RUN_ID" || "$RUN_ID" == "null" ]]; then
            echo "::warning::Could not find docker workflow artifacts, building binaries locally"
            exit 0
          fi

          gh run download "$RUN_ID" -n binary-amd64 -D /tmp/artifacts/binary-amd64 || true
          gh run download "$RUN_ID" -n binary-arm64 -D /tmp/artifacts/binary-arm64 || true

          if [[ -f /tmp/artifacts/binary-amd64/pulumi-kubernetes-operator ]]; then
            cp /tmp/artifacts/binary-amd64/pulumi-kubernetes-operator \
               /tmp/release/pulumi-kubernetes-operator-linux-amd64
          fi
          if [[ -f /tmp/artifacts/binary-arm64/pulumi-kubernetes-operator ]]; then
            cp /tmp/artifacts/binary-arm64/pulumi-kubernetes-operator \
               /tmp/release/pulumi-kubernetes-operator-linux-arm64
          fi

          cd /tmp/release
          if ls * > /dev/null 2>&1; then
            sha256sum * > checksums.txt
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: /tmp/release/*
