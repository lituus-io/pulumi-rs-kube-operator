{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pulumi-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pulumi-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pulumi-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
        - port: 8081
          protocol: TCP
  egress:
    - {}  # Allow all egress (operator needs K8s API, Pulumi backends, etc.)
{{- end }}
